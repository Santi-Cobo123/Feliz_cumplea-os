<!DOCTYPE html>
<html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Te amo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            margin: 0; overflow: hidden;
            background-color: #000000;
            font-family: 'Patrick Hand', cursive;
            cursor: grab;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body:active { cursor: grabbing; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

        #main-title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4.5em;
            color: #F6D1D5;
            text-shadow: 0 0 15px #E8A2A8, 0 0 25px #D97F88;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        #entry-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; display: flex; justify-content: center; align-items: center;
            flex-direction: column; color: white; z-index: 9999; padding: 20px;
        }

        #entry-button {
            padding: 16px 34px;
            border: 2px solid #E8A2A8;
            border-radius: 999px;
            background: linear-gradient(135deg, #F2B9BF, #D97F88);
            color: #FFFFFF;
            font-family: 'Patrick Hand', cursive;
            font-size: 2em;
            font-weight: 700;
            cursor: pointer;
            filter: drop-shadow(0 0 15px #E8A2A8) drop-shadow(0 0 25px #D97F88);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            animation: latido 1.5s infinite ease-in-out;
        }

        #entry-button:hover {
            filter: drop-shadow(0 0 20px #F4C2C7) drop-shadow(0 0 35px #E8A2A8);
            transform: scale(1.05);
        }
        
        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        #entry-text {
            font-size: 1.8em;
            color: #F6D1D5;
            text-shadow: 0 0 10px #E8A2A8;
            text-align: center;
        }

        #love-card-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        #love-card {
            position: relative;
            width: 90%; max-width: 400px;
            aspect-ratio: 9 / 16;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 0 30px #E8A2A8, 0 0 50px #D97F88;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            text-align: center;
            overflow: hidden;
        }

        #love-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        #love-card-text {
            position: relative;
            font-size: 3em;
            color: #ffffff;
            text-shadow: 0 0 8px black, 0 0 15px black;
            z-index: 2;
        }

        @media (max-width: 768px) {
            #main-title { font-size: 3.4em; top: 25px; }
            #love-card-text { font-size: 2.8em; }
        }

        @media (max-width: 480px) {
            #main-title { font-size: 2.5em; top: 20px; }
        }
    </style>
</head>
<body>
    <h1 id="main-title">Solo para ti mi Amor Kathia Elizabeth</h1>

    <div id="entry-modal">
        <button id="entry-button">Apreta aquí</button>
        <div id="entry-text">Kathia Mi Amor</div>
    </div>

    <div id="love-card-overlay" style="display: none;">
        <div id="love-card" style="background-image: url('https://para-mi-luji.netlify.app/assets/card1.jpg');">
            <p id="love-card-text">Hoy quiero celebrar tu vida y desearte que tu mundo siempre esté lleno de colores hermosos.</p>
        </div>
    </div>

    <audio id="background-music" loop=""></audio>

    <canvas id="galaxy-canvas"></canvas>

    <script type="importmap">
    { "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        } }
    </script>
    
    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const CONFIG = {
        galaxy: { rotationSpeed: 0.12, centerExclusionRadius: 45 },
        elementExclusionRadius: 40,
        blackHole: { radius: 12, segments: 64, color1: '#000000', color2: '#050505' },
        accretionRing: {
            innerRadius: 18, outerRadius: 32, segments: 128,
            centerColor: '#F6D1D5', midColor: '#E8A2A8', edgeColor: '#D97F88',
            emissiveIntensity: 0.6,
        },
        particles: {
            coreStars: { count: 20000, radius: 120, maxHeight: 60, size: 0.25 },
            sphericalHalo: { count: 18000, radiusXZ: 110, radiusY: 55, size: 0.18, minDistFromCenter: 28 },
            backgroundStars: { count: 5000, radius: 500, size: 0.2 },
            texts: {
                count: 50, width: 45, height: 20, minRadius: null, maxRadius: 120,
                content: ["Siempre contigo ","Eres mi calma ","Me haces feliz ","Tu sonrisa brilla ","Qué bonito coincidir ","Mi lugar favorito ","Contigo todo mejora ","Tu luz me inspira ","Eres increíble ","Gracias por existir ","Mi corazón te elige ","Qué suerte tenerte ","Eres mi paz "],
                colors: [{ fill: '#E8A2A8', shadow: '#D97F88' },{ fill: '#F6D1D5', shadow: '#E8A2A8' },{ fill: '#F2B9BF', shadow: '#D97F88' }]
            },
            emojis: {
                count: 60, size: 12, minRadius: null, maxRadius: 120,
                content: ['💖','💘','💞','💕','❤️','💐','🌸','🌹','🌺','🌷'],
                colors: [{ fill: '#F6D1D5', shadow: '#D97F88' },{ fill: '#F2B9BF', shadow: '#E8A2A8' },{ fill: '#E8A2A8', shadow: '#D97F88' }]
            }
        },
        loveCards: {
            images: ['https://para-mi-luji.netlify.app/assets/card1.jpg','https://para-mi-luji.netlify.app/assets/card2.jpg','https://para-mi-luji.netlify.app/assets/card3.jpg','https://para-mi-luji.netlify.app/assets/card4.jpg'],
            phrases: ["Admiro la forma en que haces bonito hasta los días simples. ","Tu presencia tiene algo único: todo se siente más cálido contigo. ","Este detalle es para recordarte lo especial que eres para mí. ","Ojalá nunca te falten motivos para sonreír y soñar en grande. "]
        },
        shootingStars: { enabled: true, spawnProbability: 0.01, speed: 1.2 },
        lighting: { ambientLight: { color: '#ffffff', intensity: 0.1 }, pointLight: { color: '#E8A2A8', intensity: 2.5, distance: 350 } },
        bloomEffect: { threshold: 0.68, strength: 0.7, radius: 0.5 },
        cameraControls: { minDistance: 30, maxDistance: 250 }
    };

    let scene, camera, renderer, controls, galaxyGroup, clock, sphereMaterial, composer;
    let loveTexts = [], loveImages = [], shootingStars = [], occupiedPositions = [];
    let raycaster, mouse, currentCardIndex = 0;

    function init() {
        scene = new THREE.Scene();
        clock = new THREE.Clock();
        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy-canvas'), antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.minDistance = CONFIG.cameraControls.minDistance;
        controls.maxDistance = CONFIG.cameraControls.maxDistance;
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = CONFIG.bloomEffect.threshold;
        bloomPass.strength = CONFIG.bloomEffect.strength;
        bloomPass.radius = CONFIG.bloomEffect.radius;
        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        const { ambientLight, pointLight } = CONFIG.lighting;
        scene.add(new THREE.AmbientLight(ambientLight.color, ambientLight.intensity));
        const mainLight = new THREE.PointLight(pointLight.color, pointLight.intensity, pointLight.distance);
        mainLight.position.set(0, 0, 0);
        scene.add(mainLight);
        galaxyGroup = new THREE.Group();
        scene.add(galaxyGroup);
        createBlackHole(); createCoreStars(); createSphericalHalo(); createBackgroundStars(); createLoveElements();
        window.addEventListener('resize', onWindowResize);
        renderer.domElement.addEventListener('click', onCanvasClick);
        onWindowResize();
        animate();
    }
    
    function createBlackHole() {
        const bhConfig = CONFIG.blackHole, ringConfig = CONFIG.accretionRing;
        sphereMaterial = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0.0 }, uColor1: { value: new THREE.Color(bhConfig.color1) }, uColor2: { value: new THREE.Color(bhConfig.color2) } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `uniform float uTime; uniform vec3 uColor1; uniform vec3 uColor2; varying vec2 vUv; float noise(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123); } void main() { float n = noise(vUv * 4.0 + uTime * 0.1); vec3 mixedColor = mix(uColor1, uColor2, n); gl_FragColor = vec4(mixedColor, 1.0); }`
        });
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(bhConfig.radius, bhConfig.segments, bhConfig.segments), sphereMaterial));
        const ringGeometry = new THREE.RingGeometry(ringConfig.innerRadius, ringConfig.outerRadius, ringConfig.segments);
        const ringMaterial = new THREE.ShaderMaterial({
            uniforms: { innerRadius: { value: ringConfig.innerRadius }, outerRadius: { value: ringConfig.outerRadius }, centerColor: { value: new THREE.Color(ringConfig.centerColor) }, midColor: { value: new THREE.Color(ringConfig.midColor) }, edgeColor: { value: new THREE.Color(ringConfig.edgeColor) }, emissiveIntensity: { value: ringConfig.emissiveIntensity } },
            vertexShader: `varying vec3 vPosition; void main() { vPosition = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `uniform float innerRadius; uniform float outerRadius; uniform vec3 centerColor; uniform vec3 midColor; uniform vec3 edgeColor; uniform float emissiveIntensity; varying vec3 vPosition; void main() { float dist = length(vPosition.xy); float nd = clamp((dist - innerRadius) / (outerRadius - innerRadius), 0.0, 1.0); vec3 finalColor; if (nd < 0.5) { finalColor = mix(centerColor, midColor, nd * 2.0); } else { finalColor = mix(midColor, edgeColor, (nd - 0.5) * 2.0); } float glowFactor = 1.0 - smoothstep(0.0, 1.0, nd); vec3 emissiveColor = finalColor * emissiveIntensity * glowFactor; gl_FragColor = vec4(finalColor + emissiveColor, 1.0); }`,
            side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
    }

    function createCoreStars() {
        const c = CONFIG.particles.coreStars;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(c.count * 3), colors = new Float32Array(c.count * 3);
        const color = new THREE.Color();
        for (let i = 0; i < c.count; i++) {
            const distance = CONFIG.accretionRing.outerRadius + Math.random() * (c.radius - CONFIG.accretionRing.outerRadius);
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * c.maxHeight * Math.pow(1 - (distance / c.radius), 1.5);
            positions.set([Math.cos(angle) * distance, y, Math.sin(angle) * distance], i * 3);
            color.setHSL((0.82 + Math.random() * 0.12) % 1, 0.8 + Math.random() * 0.2, 0.6 + Math.random() * 0.4);
            colors.set([color.r, color.g, color.b], i * 3);
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        galaxyGroup.add(new THREE.Points(geometry, new THREE.PointsMaterial({ size: c.size, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true })));
    }

    function createSphericalHalo() {
        const h = CONFIG.particles.sphericalHalo;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(h.count * 3), colors = new Float32Array(h.count * 3);
        const color = new THREE.Color();
        let filled = 0;
        while (filled < h.count) {
            const rx = Math.random() * 2 - 1, ry = Math.random() * 2 - 1, rz = Math.random() * 2 - 1;
            if (rx*rx + ry*ry + rz*rz > 1.0) continue;
            const x = rx * h.radiusXZ, y = ry * h.radiusY, z = rz * h.radiusXZ;
            const dist = Math.sqrt(x*x + y*y + z*z);
            if (dist < h.minDistFromCenter) continue;
            const rNorm = dist / Math.max(h.radiusXZ, h.radiusY);
            if (Math.random() > Math.pow(1.0 - rNorm * 0.7, 1.2)) continue;
            positions.set([x, y, z], filled * 3);
            color.setHSL((0.82 + Math.random() * 0.12) % 1, 0.6 + Math.random() * 0.4, 0.45 + Math.random() * 0.45);
            colors.set([color.r, color.g, color.b], filled * 3);
            filled++;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        galaxyGroup.add(new THREE.Points(geometry, new THREE.PointsMaterial({ size: h.size, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, opacity: 0.65 })));
    }

    function createBackgroundStars() {
        const bg = CONFIG.particles.backgroundStars;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(bg.count * 3);
        for (let i = 0; i < bg.count; i++) {
            positions.set([(Math.random()-0.5)*2*bg.radius,(Math.random()-0.5)*2*bg.radius,(Math.random()-0.5)*2*bg.radius], i*3);
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ size: bg.size, color: 0xffffff, transparent: true, opacity: 0.5 })));
    }

    function createLoveElements() {
        const tc = CONFIG.particles.texts, ec = CONFIG.particles.emojis;
        for (let i = 0; i < tc.count; i++) {
            const colorData = tc.colors[i % tc.colors.length];
            const texture = createTextTexture(tc.content[i % tc.content.length], colorData);
            const material = new THREE.MeshPhongMaterial({ map: texture, transparent: true, alphaTest: 0.1, emissive: colorData.fill, emissiveIntensity: 1.2 });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(tc.width, tc.height), material);
            setElementOrbitPosition(mesh, tc.minRadius, tc.maxRadius);
            galaxyGroup.add(mesh); loveTexts.push(mesh);
        }
        for (let i = 0; i < ec.count; i++) {
            const colorData = ec.colors[i % ec.colors.length];
            const texture = createEmojiTexture(ec.content[i % ec.content.length], colorData);
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, alphaTest: 0.1 });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(ec.size, ec.size), material);
            setElementOrbitPosition(mesh, ec.minRadius, ec.maxRadius);
            galaxyGroup.add(mesh); loveImages.push(mesh);
        }
    }

    function createShootingStar() {
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0]), 3));
        const star = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 1.8, blending: THREE.AdditiveBlending, transparent: true }));
        star.position.set(THREE.MathUtils.randFloatSpread(800), THREE.MathUtils.randFloat(100,300), THREE.MathUtils.randFloatSpread(800));
        star.userData.velocity = new THREE.Vector3((Math.random()<0.5?-1:1)*CONFIG.shootingStars.speed, -CONFIG.shootingStars.speed*0.5, (Math.random()-0.5)*2);
        star.userData.life = 0;
        shootingStars.push(star); scene.add(star);
    }

    function setElementOrbitPosition(element, minRadius, maxRadius) {
        const safeMin = minRadius || CONFIG.elementExclusionRadius;
        const safeMax = maxRadius || CONFIG.particles.coreStars.radius;
        let validPosition = false, attempts = 0;
        let fp = { x: 0, y: 0, z: 0 };
        while (!validPosition && attempts < 50) {
            attempts++;
            const radius = safeMin + Math.random() * (safeMax - safeMin);
            const theta = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 15;
            const x = radius * Math.cos(theta), z = radius * Math.sin(theta);
            validPosition = true;
            for (let pos of occupiedPositions) {
                if (Math.sqrt(Math.pow(x-pos.x,2)+Math.pow(y-pos.y,2)+Math.pow(z-pos.z,2)) < 18) { validPosition = false; break; }
            }
            if (validPosition) fp = { x, y, z };
        }
        element.position.set(fp.x, fp.y, fp.z);
        occupiedPositions.push(fp);
    }
    
    function createTextTexture(text, color) {
        const canvas = document.createElement('canvas');
        canvas.width = 1536; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.font = '84px "Patrick Hand", cursive';
        ctx.fillStyle = color.fill;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = color.shadow; ctx.shadowBlur = 3;
        const words = text.split(' '), maxWidth = canvas.width - 100, lineHeight = 100;
        let lines = [], currentLine = words[0];
        for (let i = 1; i < words.length; i++) {
            const testLine = currentLine + ' ' + words[i];
            if (ctx.measureText(testLine).width > maxWidth && currentLine.length > 0) { lines.push(currentLine); currentLine = words[i]; }
            else { currentLine = testLine; }
        }
        lines.push(currentLine);
        const startY = canvas.height / 2 - (lines.length - 1) * lineHeight / 2;
        lines.forEach((line, index) => ctx.fillText(line, canvas.width / 2, startY + index * lineHeight));
        return new THREE.CanvasTexture(canvas);
    }

    function createEmojiTexture(emoji, colorData) {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,512,512);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = '320px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        ctx.shadowColor = colorData.shadow; ctx.shadowBlur = 24;
        ctx.fillStyle = colorData.fill;
        ctx.fillText(emoji, 256, 272);
        const t = new THREE.CanvasTexture(canvas);
        t.colorSpace = THREE.SRGBColorSpace;
        t.generateMipmaps = false;
        t.minFilter = THREE.LinearFilter;
        t.magFilter = THREE.LinearFilter;
        return t;
    }

    function onWindowResize() {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h); composer.setSize(w, h);
        camera.aspect = w / h;
        camera.position.set(0, 35, w < 768 ? 150 : 120);
        camera.updateProjectionMatrix();
    }

    function onCanvasClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        if (raycaster.intersectObjects(loveImages).length > 0) showLoveCard();
    }

    function showLoveCard() {
        const overlay = document.getElementById('love-card-overlay');
        const card = document.getElementById('love-card');
        const text = document.getElementById('love-card-text');
        card.style.backgroundImage = `url('${CONFIG.loveCards.images[currentCardIndex]}')`;
        text.textContent = CONFIG.loveCards.phrases[currentCardIndex];
        overlay.style.display = 'flex';
        currentCardIndex = (currentCardIndex + 1) % CONFIG.loveCards.images.length;
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        galaxyGroup.rotation.y = t * CONFIG.galaxy.rotationSpeed;
        if (sphereMaterial) sphereMaterial.uniforms.uTime.value = t;
        loveTexts.forEach(m => m.lookAt(camera.position));
        loveImages.forEach(m => m.lookAt(camera.position));
        if (CONFIG.shootingStars.enabled && Math.random() < CONFIG.shootingStars.spawnProbability) createShootingStar();
        shootingStars.forEach((star, i) => {
            star.position.add(star.userData.velocity);
            if (++star.userData.life > 300) { scene.remove(star); shootingStars.splice(i, 1); }
        });
        controls.update();
        composer.render();
    }
    
    init();

    document.getElementById('entry-button').addEventListener('click', () => {
        const music = document.getElementById('background-music');
        music.src = 'https://github.com/Baque2005/Organizador/raw/refs/heads/master/Harry%20Styles%20-%20Sign%20of%20the%20Times%20(Official%20Video).mp3';
        music.load();
        music.play().catch(e => console.error('Error al reproducir música:', e));
        document.getElementById('entry-modal').style.display = 'none';
    });

    document.getElementById('love-card-overlay').addEventListener('click', () => {
        document.getElementById('love-card-overlay').style.display = 'none';
    });
    </script>
</body></html>
